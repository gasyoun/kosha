<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reading packs — kosha</title>
<meta name="description" content="Word-by-word Sanskrit reading packs from the Digital Corpus of Sanskrit; every word links to its kosha dictionary card.">
<style>
  :root{
    --bg:#fbfaf7; --fg:#1c1a17; --muted:#6b6660; --line:#e6e1d8;
    --card:#fff; --accent:#7a4f2b; --link:#8a531f; --chip:#f2ede3;
    --chip-un:#f6f2ec; --un:#b3a99c;
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#17150f; --fg:#ece7dd; --muted:#9c948a; --line:#2e2a22;
      --card:#1f1c15; --accent:#d9a066; --link:#e0ad72; --chip:#2a251c;
      --chip-un:#221f18; --un:#6a6357;}
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{max-width:860px;margin:0 auto;padding:1.5rem 1.1rem 4rem;}
  header h1{font-size:1.5rem;margin:.2rem 0 .3rem;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:.92rem;margin:0 0 .2rem}
  .stats{color:var(--muted);font-size:.85rem;margin:.6rem 0 0}
  .stats b{color:var(--fg)}
  .picker{display:flex;gap:.5rem;flex-wrap:wrap;margin:1rem 0 1.4rem}
  .pk{padding:.35rem .8rem;border:1px solid var(--line);border-radius:999px;
    background:var(--card);color:var(--fg);cursor:pointer;font-size:.9rem}
  .pk[aria-selected="true"]{background:var(--accent);color:#fff;border-color:var(--accent)}
  .pk[disabled]{opacity:.5;cursor:not-allowed}
  .sent{border-top:1px solid var(--line);padding:1rem 0 .4rem}
  .locus{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .deva{font-size:1.3rem;margin:.25rem 0 .1rem;color:var(--fg)}
  .iast{font-size:.95rem;margin:0 0 .6rem;color:var(--muted);font-style:italic}
  .toks{display:flex;flex-wrap:wrap;gap:.3rem}
  .tok{display:inline-block;padding:.12rem .5rem;border-radius:.5rem;background:var(--chip);
    color:var(--link);text-decoration:none;font-size:.98rem;border:1px solid transparent}
  .tok:hover{border-color:var(--accent);background:var(--card)}
  .tok.un{background:var(--chip-un);color:var(--un);cursor:default}
  .tok small{display:block;font-size:.66rem;color:var(--muted);line-height:1.2;margin-top:1px}
  .parked{margin:2.2rem 0 0;padding:1rem 1.1rem;border:1px dashed var(--line);
    border-radius:.6rem;background:var(--card);color:var(--muted);font-size:.9rem}
  .parked b{color:var(--fg)}
  .banner{margin:0 0 1.2rem;padding:.7rem 1rem;border-radius:.5rem;font-size:.85rem;
    background:rgba(180,120,20,.13);border:1px solid rgba(180,120,20,.35);color:var(--fg)}
  .banner b{color:var(--accent)}
  a.src{color:var(--link)}
  footer{margin-top:2rem;color:var(--muted);font-size:.8rem}
  code{background:var(--chip);padding:.05rem .3rem;border-radius:.3rem;font-size:.85em}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="title">Reading packs</h1>
    <p class="sub" id="sub"></p>
    <p class="stats" id="stats"></p>
    <div class="picker" id="picker" role="tablist"></div>
  </header>
  <div class="banner" id="banner" hidden></div>
  <main id="passage"></main>

  <footer>
    Text &amp; lemmatisation: <a class="src" href="https://www.sanskrit-linguistics.org/dcs/">Digital Corpus of Sanskrit</a> (CC BY 4.0).
    Word links resolve to kosha dictionary cards. Build details:
    <a class="src" href="https://github.com/gasyoun/kosha/blob/main/reading/BUILD_REPORT.md">BUILD_REPORT.md</a> ·
    <a class="src" href="https://github.com/gasyoun/kosha/blob/main/scripts/build_reading_pack.py">build_reading_pack.py</a>.
  </footer>
</div>

<!-- data shards: each sets window.READING_DATA[slug] -->
<script src="data/nala-1.js"></script>
<script src="data/gita-1.js"></script>
<script src="data/gita-2.js"></script>
<script src="data/gita-3.js"></script>
<script src="data/gita-4.js"></script>
<script src="data/gita-5.js"></script>
<script src="data/gita-6.js"></script>
<script src="data/gita-7.js"></script>
<script src="data/gita-8.js"></script>
<script src="data/gita-9.js"></script>
<script src="data/gita-10.js"></script>
<script src="data/gita-11.js"></script>
<script src="data/gita-12.js"></script>
<script src="data/gita-13.js"></script>
<script src="data/gita-14.js"></script>
<script src="data/gita-15.js"></script>
<script src="data/gita-16.js"></script>
<script src="data/gita-17.js"></script>
<script src="data/gita-18.js"></script>
<script>
(function(){
  var DATA = window.READING_DATA || {};
  function sortkey(s){
    if(s.indexOf("nala")===0) return [0, parseInt(s.split("-")[1])||0];
    if(s.indexOf("gita")===0) return [1, parseInt(s.split("-")[1])||0];
    return [2,0];
  }
  var PACKS = Object.keys(DATA).sort(function(a,b){
    var ka=sortkey(a), kb=sortkey(b); return ka[0]-kb[0] || ka[1]-kb[1];
  }).map(function(slug){
    var d=DATA[slug];
    var label = slug.indexOf("gita")===0 ? ("Gītā "+(d.chapter||slug.split("-")[1]))
              : slug.indexOf("nala")===0 ? ("Nala "+slug.split("-")[1]) : slug;
    return {slug:slug, label:label};
  });
  function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

  function render(slug){
    var d = DATA[slug];
    if(!d) return;
    document.getElementById("title").textContent = d.title;
    document.getElementById("sub").textContent = d.ref + " · " + d.text_name + " · " + d.source;
    var st = d.stats;
    document.getElementById("stats").innerHTML =
      "<b>"+st.sentences+"</b> sentences · <b>"+st.tokens+"</b> words · <b>"+
      st.linked_tokens+"</b> linked to a card (<b>"+st.link_rate_pct+"%</b>)";
    var ban = document.getElementById("banner");
    if(d.experimental){
      ban.innerHTML = "<b>Experimental — machine-segmented.</b> "+esc(d.method||
        "Lemmas are auto-segmented and may be wrong; verify before citing.");
      ban.hidden = false;
    } else { ban.hidden = true; }
    var pas = d.sentences.map(function(s){
      var toks = s.tokens.map(function(t){
        var meta = esc(t.lemma) + (t.morph? " · "+esc(t.morph):"") + (t.gloss? " · "+esc(t.gloss):"");
        if(t.href){
          return '<a class="tok" href="'+esc(t.href)+'" title="'+meta+'">'+esc(t.form)+
                 '<small>'+esc(t.lemma)+'</small></a>';
        }
        return '<span class="tok un" title="'+meta+' (no card)">'+esc(t.form)+
               '<small>'+esc(t.lemma)+'</small></span>';
      }).join("");
      var head = s.deva
        ? '<div class="deva">'+esc(s.deva)+'</div><div class="iast">'+esc(s.text)+'</div>'
        : '<div class="deva">'+esc(s.text)+'</div>';
      return '<div class="sent"><div class="locus">'+esc(s.locus)+'</div>'+
             head+'<div class="toks">'+toks+'</div></div>';
    }).join("");
    document.getElementById("passage").innerHTML = pas;
    document.querySelectorAll(".pk").forEach(function(b){
      b.setAttribute("aria-selected", b.dataset.slug===slug ? "true":"false");
    });
  }

  var pk = document.getElementById("picker");
  PACKS.forEach(function(p){
    var b = document.createElement("button");
    b.className="pk"; b.textContent=p.label; b.dataset.slug=p.slug;
    b.setAttribute("role","tab");
    if(p.disabled || !DATA[p.slug]){ b.disabled=true; b.title="parked — no data yet"; }
    else b.onclick=function(){ render(p.slug); location.hash=p.slug; };
    pk.appendChild(b);
  });

  var first = (location.hash||"").replace("#","");
  if(!DATA[first]) first = PACKS.find(function(p){return DATA[p.slug];}).slug;
  render(first);
})();
</script>
</body>
</html>
